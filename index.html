<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Verben">
  <meta name="theme-color" content="#0f0e17">
  <link rel="manifest" href="manifest.json">
  <link rel="apple-touch-icon" href="icons/icon-192.png">
  <title>Deutsch Verben Trainer</title>
  <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0f0e17;
      --surface: #1a1828;
      --surface2: #231f35;
      --border: rgba(255,255,255,0.08);
      --border-hover: rgba(255,255,255,0.18);
      --accent: #8b7cf8;
      --accent-soft: rgba(139,124,248,0.15);
      --accent-dim: rgba(139,124,248,0.09);
      --text: #f0eeff;
      --text-muted: rgba(240,238,255,0.5);
      --text-faint: rgba(240,238,255,0.28);
      --green: #4ade80;
      --green-bg: rgba(74,222,128,0.1);
      --green-border: rgba(74,222,128,0.28);
      --red: #f87171;
      --red-bg: rgba(248,113,113,0.1);
      --red-border: rgba(248,113,113,0.28);
      --amber: #fbbf24;
      --amber-bg: rgba(251,191,36,0.1);
      --amber-border: rgba(251,191,36,0.25);
      --radius: 14px;
      --radius-sm: 10px;
      --radius-lg: 20px;
      --safe-top: env(safe-area-inset-top, 0px);
      --safe-bottom: env(safe-area-inset-bottom, 0px);
    }

    html { font-size: 16px; -webkit-text-size-adjust: 100%; }

    body {
      font-family: 'DM Sans', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100dvh;
      display: flex;
      flex-direction: column;
      align-items: center;
      overflow-x: hidden;
      -webkit-font-smoothing: antialiased;
    }

    body::before {
      content: '';
      position: fixed;
      top: -150px; left: 50%;
      transform: translateX(-50%);
      width: 500px; height: 500px;
      background: radial-gradient(circle, rgba(139,124,248,0.13) 0%, transparent 70%);
      pointer-events: none;
      z-index: 0;
    }

    header {
      width: 100%; max-width: 600px;
      padding: calc(var(--safe-top) + 1.5rem) 1.25rem 0;
      position: relative; z-index: 1;
    }
    .logo-row {
      display: flex; align-items: center; justify-content: space-between;
    }
    .logo {
      font-family: 'DM Serif Display', serif;
      font-size: 0.95rem;
      color: var(--accent);
      letter-spacing: 0.04em;
    }
    .install-hint {
      font-size: 0.72rem;
      color: var(--text-faint);
      background: var(--surface);
      border: 0.5px solid var(--border);
      border-radius: 99px;
      padding: 4px 10px;
      display: none;
    }
    header h1 {
      font-family: 'DM Serif Display', serif;
      font-size: clamp(1.7rem, 6vw, 2.2rem);
      font-weight: 400;
      color: var(--text);
      margin-top: 0.2rem;
      line-height: 1.15;
    }
    header h1 em { font-style: italic; color: var(--accent); }
    header p { font-size: 0.85rem; color: var(--text-muted); margin-top: 0.4rem; }

    main {
      width: 100%; max-width: 600px;
      padding: 1.5rem 1.25rem calc(var(--safe-bottom) + 3rem);
      position: relative; z-index: 1;
      flex: 1;
    }

    .screen { display: none; animation: fadeIn 0.18s ease; }
    .screen.active { display: block; }
    @keyframes fadeIn { from { opacity: 0; transform: translateY(6px); } to { opacity: 1; transform: none; } }

    /* ── Saved sessions banner ── */
    .saved-section { margin-bottom: 1.25rem; }
    .saved-label {
      font-size: 0.75rem;
      font-weight: 600;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: var(--text-faint);
      margin-bottom: 0.6rem;
    }
    .saved-list { display: flex; flex-direction: column; gap: 7px; }
    .saved-card {
      background: var(--surface);
      border: 0.5px solid var(--border);
      border-radius: var(--radius-sm);
      padding: 11px 14px;
      display: flex;
      align-items: center;
      gap: 10px;
      cursor: pointer;
      transition: border-color 0.18s, background 0.18s;
      -webkit-tap-highlight-color: transparent;
    }
    .saved-card:active { background: var(--surface2); border-color: var(--border-hover); }
    .saved-card .saved-icon {
      width: 36px; height: 36px;
      background: var(--accent-dim);
      border-radius: 9px;
      display: flex; align-items: center; justify-content: center;
      font-size: 1rem; flex-shrink: 0;
    }
    .saved-card .saved-info { flex: 1; min-width: 0; }
    .saved-card .saved-name {
      font-size: 0.9rem; font-weight: 600; color: var(--text);
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    }
    .saved-card .saved-meta { font-size: 0.75rem; color: var(--text-muted); margin-top: 2px; }
    .saved-card .saved-arrow { color: var(--text-faint); font-size: 1rem; flex-shrink: 0; }
    .saved-card .saved-del {
      background: none; border: none;
      color: var(--text-faint); font-size: 1rem;
      cursor: pointer; padding: 4px 6px; border-radius: 6px;
      flex-shrink: 0; transition: color 0.15s;
    }
    .saved-card .saved-del:active { color: var(--red); }

    .divider-label {
      font-size: 0.75rem;
      font-weight: 600;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: var(--text-faint);
      margin-bottom: 0.9rem;
      margin-top: 0.25rem;
      display: flex; align-items: center; gap: 10px;
    }
    .divider-label::after {
      content: '';
      flex: 1; height: 0.5px;
      background: var(--border);
    }

    /* ── Level tabs ── */
    .level-tabs {
      display: flex; gap: 5px;
      background: var(--surface);
      padding: 4px;
      border-radius: var(--radius-sm);
      border: 0.5px solid var(--border);
      margin-bottom: 1rem;
      width: fit-content;
    }
    .tab-btn {
      background: transparent; border: none;
      border-radius: 7px;
      padding: 7px 16px;
      font-size: 0.82rem;
      font-family: 'DM Sans', sans-serif;
      color: var(--text-muted);
      cursor: pointer;
      transition: all 0.18s;
      font-weight: 500;
      -webkit-tap-highlight-color: transparent;
    }
    .tab-btn.active { background: var(--accent-soft); color: var(--accent); }

    /* ── Search ── */
    .search-wrap { position: relative; margin-bottom: 0.9rem; }
    .search-wrap svg {
      position: absolute; left: 13px; top: 50%;
      transform: translateY(-50%);
      opacity: 0.3; pointer-events: none;
    }
    .search-box {
      width: 100%;
      background: var(--surface);
      border: 0.5px solid var(--border);
      border-radius: var(--radius-sm);
      color: var(--text);
      font-family: 'DM Sans', sans-serif;
      font-size: 1rem;
      padding: 11px 14px 11px 40px;
      outline: none;
      transition: border-color 0.2s;
      -webkit-appearance: none;
    }
    .search-box:focus { border-color: var(--accent); }
    .search-box::placeholder { color: var(--text-faint); }

    /* ── Selection bar ── */
    .selection-bar {
      display: flex; align-items: center; justify-content: space-between;
      margin-bottom: 0.9rem; flex-wrap: wrap; gap: 8px;
    }
    .selection-info { font-size: 0.82rem; color: var(--text-muted); }
    .selection-info strong { color: var(--accent); }
    .sel-actions { display: flex; gap: 5px; flex-wrap: wrap; }

    /* ── Verb grid ── */
    .verb-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(130px, 1fr));
      gap: 7px;
      max-height: 320px;
      overflow-y: auto;
      padding: 2px 2px 6px;
      margin-bottom: 1.25rem;
      -webkit-overflow-scrolling: touch;
    }
    .verb-chip {
      background: var(--surface);
      border: 0.5px solid var(--border);
      border-radius: var(--radius-sm);
      padding: 10px 10px;
      cursor: pointer;
      transition: all 0.14s;
      user-select: none;
      -webkit-tap-highlight-color: transparent;
    }
    .verb-chip:active { background: var(--surface2); }
    .verb-chip.selected {
      border-color: rgba(139,124,248,0.55);
      background: var(--accent-dim);
    }
    .verb-chip .de { font-size: 0.8rem; font-weight: 600; color: var(--text); }
    .verb-chip .ar { font-size: 0.72rem; color: var(--text-muted); margin-top: 3px; direction: rtl; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .verb-chip.selected .de { color: var(--accent); }

    /* ── Mode toggle ── */
    .mode-row { display: flex; align-items: center; gap: 10px; margin-bottom: 1.25rem; flex-wrap: wrap; }
    .mode-row label { font-size: 0.82rem; color: var(--text-muted); white-space: nowrap; }
    .mode-toggle {
      display: flex; gap: 5px;
      background: var(--surface);
      border: 0.5px solid var(--border);
      border-radius: var(--radius-sm);
      padding: 4px; flex: 1; min-width: 220px;
    }
    .mode-btn {
      flex: 1; border: none; border-radius: 7px;
      background: transparent; color: var(--text-muted);
      font-family: 'DM Sans', sans-serif;
      font-size: 0.8rem; padding: 7px 8px;
      cursor: pointer; transition: all 0.18s; font-weight: 500;
      -webkit-tap-highlight-color: transparent;
    }
    .mode-btn.active { background: var(--accent-soft); color: var(--accent); }

    /* ── Save row ── */
    .save-row {
      display: flex; gap: 10px; align-items: center;
      margin-bottom: 1.25rem; flex-wrap: wrap;
    }
    .save-input {
      flex: 1; min-width: 150px;
      background: var(--surface);
      border: 0.5px solid var(--border);
      border-radius: var(--radius-sm);
      color: var(--text);
      font-family: 'DM Sans', sans-serif;
      font-size: 0.88rem;
      padding: 9px 12px;
      outline: none;
      transition: border-color 0.2s;
      -webkit-appearance: none;
    }
    .save-input:focus { border-color: var(--accent); }
    .save-input::placeholder { color: var(--text-faint); }

    /* ── Buttons ── */
    .btn-primary {
      background: var(--accent);
      border: none; border-radius: var(--radius);
      color: #0f0e17;
      font-family: 'DM Sans', sans-serif;
      font-size: 1rem; font-weight: 600;
      padding: 14px 28px;
      cursor: pointer; transition: opacity 0.15s, transform 0.1s;
      -webkit-tap-highlight-color: transparent;
      width: 100%;
    }
    .btn-primary:active { opacity: 0.84; transform: scale(0.98); }
    .btn-primary:disabled { opacity: 0.28; cursor: default; transform: none; }

    .btn-outline {
      background: transparent;
      border: 0.5px solid var(--border-hover);
      border-radius: var(--radius-sm);
      color: var(--text-muted);
      font-family: 'DM Sans', sans-serif;
      font-size: 0.8rem; padding: 7px 12px;
      cursor: pointer; transition: all 0.15s;
      -webkit-tap-highlight-color: transparent;
    }
    .btn-outline:active { background: var(--surface2); color: var(--text); }

    .btn-save {
      background: var(--amber-bg);
      border: 0.5px solid var(--amber-border);
      border-radius: var(--radius-sm);
      color: var(--amber);
      font-family: 'DM Sans', sans-serif;
      font-size: 0.8rem; font-weight: 600;
      padding: 9px 14px;
      cursor: pointer; white-space: nowrap;
      -webkit-tap-highlight-color: transparent;
    }
    .btn-save:active { opacity: 0.75; }

    /* ── Study screen ── */
    .study-header {
      display: flex; align-items: center; justify-content: space-between;
      margin-bottom: 0.9rem;
    }
    .card-counter { font-size: 0.82rem; color: var(--text-muted); }
    .progress-wrap {
      background: var(--surface2); border-radius: 99px;
      height: 4px; margin-bottom: 1.75rem; overflow: hidden;
    }
    .progress-fill {
      background: var(--accent); height: 100%; border-radius: 99px;
      transition: width 0.35s ease;
    }

    .flashcard {
      background: var(--surface);
      border: 0.5px solid var(--border);
      border-radius: var(--radius-lg);
      min-height: 230px;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      cursor: pointer; padding: 2rem 1.5rem;
      margin-bottom: 1.25rem;
      transition: border-color 0.2s, background 0.2s;
      text-align: center; position: relative;
      user-select: none;
      -webkit-tap-highlight-color: transparent;
    }
    .flashcard.revealed { border-color: rgba(139,124,248,0.4); background: var(--surface2); }
    .card-label {
      font-size: 0.7rem; font-weight: 600;
      letter-spacing: 0.1em; text-transform: uppercase;
      color: var(--text-faint); margin-bottom: 1rem;
    }
    .card-word {
      font-family: 'DM Serif Display', serif;
      font-size: clamp(2rem, 8vw, 3rem);
      font-weight: 400; color: var(--text); line-height: 1.1;
    }
    .card-translation {
      font-size: 1.4rem; color: var(--accent);
      margin-top: 1rem; direction: rtl; line-height: 1.4;
    }
    .flip-hint {
      position: absolute; bottom: 13px; right: 16px;
      font-size: 0.7rem; color: var(--text-faint);
    }

    .answer-btns { display: flex; gap: 10px; margin-bottom: 1.25rem; }
    .btn-correct {
      flex: 1; background: var(--green-bg);
      border: 0.5px solid var(--green-border); border-radius: var(--radius);
      color: var(--green); font-family: 'DM Sans', sans-serif;
      font-size: 0.95rem; font-weight: 600; padding: 14px;
      cursor: pointer; -webkit-tap-highlight-color: transparent;
    }
    .btn-correct:active { opacity: 0.75; }
    .btn-wrong {
      flex: 1; background: var(--red-bg);
      border: 0.5px solid var(--red-border); border-radius: var(--radius);
      color: var(--red); font-family: 'DM Sans', sans-serif;
      font-size: 0.95rem; font-weight: 600; padding: 14px;
      cursor: pointer; -webkit-tap-highlight-color: transparent;
    }
    .btn-wrong:active { opacity: 0.75; }

    /* ── Results ── */
    .results-title {
      font-family: 'DM Serif Display', serif;
      font-size: 1.9rem; font-weight: 400; margin-bottom: 0.35rem;
    }
    .results-sub { font-size: 0.88rem; color: var(--text-muted); margin-bottom: 1.5rem; }

    .stats-grid {
      display: grid; grid-template-columns: 1fr 1fr 1fr;
      gap: 9px; margin-bottom: 1.5rem;
    }
    .stat-card {
      background: var(--surface); border: 0.5px solid var(--border);
      border-radius: var(--radius); padding: 1.1rem 0.75rem; text-align: center;
    }
    .stat-num { font-size: 1.9rem; font-weight: 600; color: var(--text); }
    .stat-label { font-size: 0.72rem; color: var(--text-muted); margin-top: 3px; }
    .stat-card.good .stat-num { color: var(--green); }
    .stat-card.bad .stat-num { color: var(--red); }

    .missed-title { font-size: 0.82rem; color: var(--text-muted); margin-bottom: 0.7rem; }
    .result-btns { display: flex; gap: 9px; flex-wrap: wrap; margin-top: 1.25rem; }

    .hr { border: none; border-top: 0.5px solid var(--border); margin: 1.25rem 0; }

    /* toast */
    .toast {
      position: fixed; bottom: calc(var(--safe-bottom) + 1.5rem); left: 50%;
      transform: translateX(-50%) translateY(20px);
      background: var(--surface2); border: 0.5px solid var(--border-hover);
      border-radius: 99px; padding: 9px 18px;
      font-size: 0.82rem; color: var(--text);
      opacity: 0; transition: opacity 0.25s, transform 0.25s;
      pointer-events: none; z-index: 999; white-space: nowrap;
    }
    .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
  </style>
</head>
<body>

<header>
  <div class="logo-row">
    <div class="logo">🇩🇪 DaF Kompakt</div>
    <div class="install-hint" id="install-hint">Add to Home Screen ↑</div>
  </div>
  <h1>Verb <em>Trainer</em></h1>
  <p>Memorize German verbs with flashcards — A1 &amp; A2</p>
</header>

<main>

  <!-- ── SELECT SCREEN ── -->
  <div id="screen-select" class="screen active">

    <!-- Saved sessions -->
    <div class="saved-section" id="saved-section" style="display:none">
      <div class="saved-label">Recent sessions</div>
      <div class="saved-list" id="saved-list"></div>
      <div style="margin-top:0.6rem; margin-bottom:0.5rem;"></div>
    </div>

    <div class="divider-label">Build a session</div>

    <div class="level-tabs">
      <button class="tab-btn active" onclick="setLevel('A1')">A1</button>
      <button class="tab-btn" onclick="setLevel('A2')">A2</button>
      <button class="tab-btn" onclick="setLevel('all')">All verbs</button>
    </div>

    <div class="search-wrap">
      <svg width="15" height="15" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.2">
        <circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/>
      </svg>
      <input class="search-box" type="search" id="search-input"
        placeholder="Search German or Arabic…" oninput="filterVerbs(this.value)" autocomplete="off">
    </div>

    <div class="selection-bar">
      <span class="selection-info" id="sel-info"><strong>0</strong> selected</span>
      <div class="sel-actions">
        <button class="btn-outline" onclick="randomPick(10)">Random 10</button>
        <button class="btn-outline" onclick="randomPick(20)">Random 20</button>
        <button class="btn-outline" onclick="selectAll()">All</button>
        <button class="btn-outline" onclick="clearSel()">Clear</button>
      </div>
    </div>

    <div class="verb-grid" id="verb-grid"></div>

    <div class="mode-row">
      <label>Direction</label>
      <div class="mode-toggle">
        <button class="mode-btn active" id="mode-de" onclick="setMode('de')">German → Arabic</button>
        <button class="mode-btn" id="mode-ar" onclick="setMode('ar')">Arabic → German</button>
      </div>
    </div>

    <!-- Save session row -->
    <div class="save-row">
      <input class="save-input" type="text" id="session-name"
        placeholder="Session name (optional)…" maxlength="40" autocomplete="off">
      <button class="btn-save" onclick="saveCurrentSelection()">💾 Save</button>
    </div>

    <button class="btn-primary" id="start-btn" onclick="startSession()" disabled>
      Start session →
    </button>
  </div>

  <!-- ── STUDY SCREEN ── -->
  <div id="screen-study" class="screen">
    <div class="study-header">
      <span class="card-counter" id="card-counter">Card 1 / 10</span>
      <button class="btn-outline" onclick="goBack()">← Back</button>
    </div>
    <div class="progress-wrap">
      <div class="progress-fill" id="progress-fill" style="width:0%"></div>
    </div>

    <div class="flashcard" id="flashcard" onclick="revealCard()">
      <div class="card-label" id="card-label">German</div>
      <div class="card-word" id="card-word"></div>
      <div class="card-translation" id="card-translation" style="display:none"></div>
      <div class="flip-hint" id="flip-hint">tap to reveal</div>
    </div>

    <div class="answer-btns" id="answer-btns" style="display:none">
      <button class="btn-wrong" onclick="markAnswer(false)">✗ Didn't know</button>
      <button class="btn-correct" onclick="markAnswer(true)">✓ Knew it</button>
    </div>
  </div>

  <!-- ── RESULTS SCREEN ── -->
  <div id="screen-results" class="screen">
    <div class="results-title" id="result-title">Session complete!</div>
    <p class="results-sub" id="result-sub"></p>

    <div class="stats-grid">
      <div class="stat-card">
        <div class="stat-num" id="r-total">0</div>
        <div class="stat-label">Total</div>
      </div>
      <div class="stat-card good">
        <div class="stat-num" id="r-correct">0</div>
        <div class="stat-label">Knew it</div>
      </div>
      <div class="stat-card bad">
        <div class="stat-num" id="r-wrong">0</div>
        <div class="stat-label">Missed</div>
      </div>
    </div>

    <div id="missed-section" style="display:none">
      <hr class="hr">
      <p class="missed-title">Verbs to review:</p>
      <div class="verb-grid" id="missed-grid" style="max-height:200px;"></div>
    </div>

    <div class="result-btns">
      <button class="btn-primary" onclick="retryMissed()" id="retry-btn" style="display:none">Retry missed</button>
    </div>
    <div class="result-btns" style="margin-top:0.75rem;">
      <button class="btn-outline" onclick="newSession()" style="flex:1;">New session</button>
      <button class="btn-outline" onclick="goBack()" style="flex:1;">Edit selection</button>
    </div>
  </div>

</main>

<div class="toast" id="toast"></div>

<script>
// ── Verb data ──────────────────────────────────────────────────
const A1 = [
  ["arbeiten","عمل / اشتغل"],["schlafen","نام"],["klicken","نقر / ضغط"],["eingeben","أدخل"],
  ["schauen","نظر إلى / أبصر"],["begrüßen","رحّب / استقبل"],["heißen","يُسمّى / سُمّي"],
  ["sehen","رأى / شاهد"],["einladen","دعا"],["kommen","جاء / أتى / قدِم"],
  ["stürzen","سقط"],["entschuldigen","اعتذر"],["erklären","شرح / بيّن"],
  ["suchen","بحث"],["korrigieren","صحّح / عدّل"],["malen","رسم"],
  ["treffen","قابل"],["fernsehen","شاهد / تفرّج"],["festhalten","تمسّك"],
  ["wissen","علِم"],["passen","ناسب / لائم / اتّق"],["sammeln","جمع"],
  ["wünschen","رغب / تمنّى"],["helfen","ساعد / أعان"],["sein","كان"],

const ALL_LOOKUP = Object.fromEntries([...A1,...A2].map(v=>[v[0],v[1]]));

// ── State ──────────────────────────────────────────────────────
let currentLevel = 'A1';
let selected = new Set();
let allVerbs = [...A1];
let filtered = [];
let mode = 'de';
let sessionCards = [];
let currentIdx = 0;
let revealed = false;
let correct = 0;
let wrong = 0;
let missedVerbs = [];

// ── localStorage helpers ───────────────────────────────────────
const LS_KEY = 'verben_sessions';

function loadSessions() {
  try { return JSON.parse(localStorage.getItem(LS_KEY)) || []; }
  catch { return []; }
}

function saveSessions(arr) {
  try { localStorage.setItem(LS_KEY, JSON.stringify(arr)); } catch {}
}

function saveCurrentSelection() {
  if (selected.size < 2) { showToast('Select at least 2 verbs first'); return; }
  const nameInput = document.getElementById('session-name');
  const name = nameInput.value.trim() ||
    (currentLevel === 'all' ? 'All verbs' : currentLevel) + ' — ' + selected.size + ' verbs';
  const sessions = loadSessions();
  const entry = {
    id: Date.now(),
    name,
    verbs: [...selected],
    level: currentLevel,
    mode,
    savedAt: new Date().toLocaleDateString('en-GB', {day:'numeric',month:'short',year:'numeric'})
  };
  sessions.unshift(entry);
  // keep max 8
  saveSessions(sessions.slice(0, 8));
  nameInput.value = '';
  renderSavedSessions();
  showToast('Session saved ✓');
}

function deleteSession(id) {
  const sessions = loadSessions().filter(s => s.id !== id);
  saveSessions(sessions);
  renderSavedSessions();
}

function loadSession(entry) {
  // restore verbs that still exist in the data
  selected = new Set(entry.verbs.filter(k => ALL_LOOKUP[k]));
  setLevel(entry.level || 'A1');
  setMode(entry.mode || 'de');
  filterVerbs('');
  showToast(`Loaded "${entry.name}"`);
}

function renderSavedSessions() {
  const sessions = loadSessions();
  const sec = document.getElementById('saved-section');
  const list = document.getElementById('saved-list');
  if (sessions.length === 0) { sec.style.display = 'none'; return; }
  sec.style.display = '';
  list.innerHTML = '';
  const EMOJIS = ['📚','🎯','⚡','🔥','✨','🧠','📖','🌟'];
  sessions.forEach((s, i) => {
    const card = document.createElement('div');
    card.className = 'saved-card';
    card.innerHTML = `
      <div class="saved-icon">${EMOJIS[i % EMOJIS.length]}</div>
      <div class="saved-info">
        <div class="saved-name">${s.name}</div>
        <div class="saved-meta">${s.verbs.length} verbs · ${s.savedAt}</div>
      </div>
      <div class="saved-arrow">›</div>
      <button class="saved-del" title="Delete" onclick="event.stopPropagation(); deleteSession(${s.id})">✕</button>
    `;
    card.onclick = () => loadSession(s);
    list.appendChild(card);
  });
}

// ── Level / filter ─────────────────────────────────────────────
function setLevel(l) {
  currentLevel = l;
  document.querySelectorAll('.tab-btn').forEach((b, i) => {
    b.classList.toggle('active', ['A1','A2','all'][i] === l);
  });
  allVerbs = l === 'A1' ? [...A1] : l === 'A2' ? [...A2] : [...A1, ...A2];
  const q = document.getElementById('search-input').value;
  filterVerbs(q);
}

function setMode(m) {
  mode = m;
  document.getElementById('mode-de').classList.toggle('active', m === 'de');
  document.getElementById('mode-ar').classList.toggle('active', m === 'ar');
}

function filterVerbs(q) {
  q = (q || '').toLowerCase();
  filtered = allVerbs.filter(v => v[0].toLowerCase().includes(q) || v[1].includes(q));
  renderGrid(filtered);
}

function renderGrid(list) {
  const grid = document.getElementById('verb-grid');
  grid.innerHTML = '';
  list.forEach(v => {
    const key = v[0];
    const div = document.createElement('div');
    div.className = 'verb-chip' + (selected.has(key) ? ' selected' : '');
    div.innerHTML = `<div class="de">${v[0]}</div><div class="ar">${v[1]}</div>`;
    div.onclick = () => {
      if (selected.has(key)) { selected.delete(key); div.classList.remove('selected'); }
      else { selected.add(key); div.classList.add('selected'); }
      updateSelInfo();
    };
    grid.appendChild(div);
  });
  updateSelInfo();
}

function updateSelInfo() {
  document.getElementById('sel-info').innerHTML = `<strong>${selected.size}</strong> selected`;
  document.getElementById('start-btn').disabled = selected.size < 2;
}

function randomPick(n) {
  selected.clear();
  const pool = [...allVerbs].sort(() => Math.random() - 0.5);
  pool.slice(0, n).forEach(v => selected.add(v[0]));
  filterVerbs(document.getElementById('search-input').value);
}

function selectAll() {
  allVerbs.forEach(v => selected.add(v[0]));
  filterVerbs(document.getElementById('search-input').value);
}

function clearSel() {
  selected.clear();
  filterVerbs(document.getElementById('search-input').value);
}

// ── Session ────────────────────────────────────────────────────
function startSession() {
  sessionCards = [...selected].map(k => [k, ALL_LOOKUP[k]]).sort(() => Math.random() - 0.5);
  currentIdx = 0; correct = 0; wrong = 0; missedVerbs = [];
  showScreen('screen-study');
  showCard();
}

function showCard() {
  const card = sessionCards[currentIdx];
  revealed = false;
  document.getElementById('flashcard').classList.remove('revealed');
  document.getElementById('card-translation').style.display = 'none';
  document.getElementById('answer-btns').style.display = 'none';
  document.getElementById('flip-hint').style.display = '';
  document.getElementById('card-label').textContent = mode === 'de' ? 'German' : 'Arabic';
  document.getElementById('card-word').textContent = mode === 'de' ? card[0] : card[1];
  const total = sessionCards.length;
  document.getElementById('card-counter').textContent = `Card ${currentIdx + 1} / ${total}`;
  document.getElementById('progress-fill').style.width = (currentIdx / total * 100) + '%';
}

function revealCard() {
  if (revealed) return;
  revealed = true;
  const card = sessionCards[currentIdx];
  document.getElementById('flashcard').classList.add('revealed');
  const tr = document.getElementById('card-translation');
  tr.textContent = mode === 'de' ? card[1] : card[0];
  tr.style.display = '';
  document.getElementById('answer-btns').style.display = 'flex';
  document.getElementById('flip-hint').style.display = 'none';
}

function markAnswer(knew) {
  if (knew) correct++;
  else { wrong++; missedVerbs.push(sessionCards[currentIdx]); }
  currentIdx++;
  if (currentIdx >= sessionCards.length) showResults();
  else showCard();
}

function showResults() {
  showScreen('screen-results');
  const total = sessionCards.length;
  const pct = Math.round(correct / total * 100);
  document.getElementById('r-total').textContent = total;
  document.getElementById('r-correct').textContent = correct;
  document.getElementById('r-wrong').textContent = wrong;
  const emoji = pct === 100 ? '🎉' : pct >= 70 ? '💪' : '📖';
  document.getElementById('result-title').textContent = emoji + ' Session complete!';
  document.getElementById('result-sub').textContent =
    `You scored ${pct}% — ${correct} out of ${total} verbs correct.`;

  const missedSec = document.getElementById('missed-section');
  const retryBtn = document.getElementById('retry-btn');
  if (missedVerbs.length > 0) {
    missedSec.style.display = '';
    retryBtn.style.display = '';
    const grid = document.getElementById('missed-grid');
    grid.innerHTML = '';
    missedVerbs.forEach(v => {
      const div = document.createElement('div');
      div.className = 'verb-chip';
      div.innerHTML = `<div class="de">${v[0]}</div><div class="ar">${v[1]}</div>`;
      grid.appendChild(div);
    });
  } else {
    missedSec.style.display = 'none';
    retryBtn.style.display = 'none';
  }
}

function retryMissed() {
  sessionCards = [...missedVerbs].sort(() => Math.random() - 0.5);
  currentIdx = 0; correct = 0; wrong = 0; missedVerbs = [];
  showScreen('screen-study');
  showCard();
}

function newSession() {
  selected.clear();
  showScreen('screen-select');
  filterVerbs('');
}

function goBack() { showScreen('screen-select'); }

function showScreen(id) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.getElementById(id).classList.add('active');
  window.scrollTo(0, 0);
}

// ── Toast ──────────────────────────────────────────────────────
let toastTimer;
function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => t.classList.remove('show'), 2200);
}

// ── iOS install hint ──────────────────────────────────────────
function isIOS() {
  return /iphone|ipad|ipod/i.test(navigator.userAgent);
}
function isStandalone() {
  return window.navigator.standalone === true;
}
if (isIOS() && !isStandalone()) {
  document.getElementById('install-hint').style.display = '';
}

// ── Service Worker ────────────────────────────────────────────
if ('serviceWorker' in navigator) {
  window.addEventListener('load', () => {
    navigator.serviceWorker.register('./sw.js').catch(() => {});
  });
}

// ── Init ──────────────────────────────────────────────────────
filtered = [...A1];
renderGrid(filtered);
renderSavedSessions();
</script>
