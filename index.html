<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Deutsch Verben Trainer</title>
  <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0f0e17;
      --surface: #1a1828;
      --surface2: #231f35;
      --border: rgba(255,255,255,0.08);
      --border-hover: rgba(255,255,255,0.16);
      --accent: #8b7cf8;
      --accent-soft: rgba(139,124,248,0.15);
      --accent-dim: rgba(139,124,248,0.08);
      --text: #f0eeff;
      --text-muted: rgba(240,238,255,0.5);
      --text-faint: rgba(240,238,255,0.28);
      --green: #4ade80;
      --green-bg: rgba(74,222,128,0.1);
      --green-border: rgba(74,222,128,0.25);
      --red: #f87171;
      --red-bg: rgba(248,113,113,0.1);
      --red-border: rgba(248,113,113,0.25);
      --radius: 12px;
      --radius-sm: 8px;
      --radius-lg: 18px;
    }

    html { font-size: 16px; }
    body {
      font-family: 'DM Sans', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    /* background decoration */
    body::before {
      content: '';
      position: fixed;
      top: -200px; left: 50%;
      transform: translateX(-50%);
      width: 600px; height: 600px;
      background: radial-gradient(circle, rgba(139,124,248,0.12) 0%, transparent 70%);
      pointer-events: none;
      z-index: 0;
    }

    header {
      width: 100%; max-width: 700px;
      padding: 2.5rem 1.5rem 0;
      position: relative; z-index: 1;
    }
    header .logo {
      font-family: 'DM Serif Display', serif;
      font-size: 1.1rem;
      color: var(--accent);
      letter-spacing: 0.02em;
    }
    header h1 {
      font-family: 'DM Serif Display', serif;
      font-size: clamp(1.8rem, 5vw, 2.4rem);
      font-weight: 400;
      color: var(--text);
      margin-top: 0.25rem;
      line-height: 1.2;
    }
    header h1 em {
      font-style: italic;
      color: var(--accent);
    }
    header p {
      font-size: 0.9rem;
      color: var(--text-muted);
      margin-top: 0.5rem;
    }

    main {
      width: 100%; max-width: 700px;
      padding: 2rem 1.5rem 4rem;
      position: relative; z-index: 1;
    }

    .screen { display: none; }
    .screen.active { display: block; }

    /* ── Level tabs ── */
    .level-tabs {
      display: flex;
      gap: 6px;
      margin-bottom: 1.25rem;
      background: var(--surface);
      padding: 5px;
      border-radius: var(--radius);
      border: 0.5px solid var(--border);
      width: fit-content;
    }
    .tab-btn {
      background: transparent;
      border: none;
      border-radius: var(--radius-sm);
      padding: 7px 18px;
      font-size: 0.85rem;
      font-family: 'DM Sans', sans-serif;
      color: var(--text-muted);
      cursor: pointer;
      transition: all 0.2s;
      font-weight: 500;
    }
    .tab-btn:hover { color: var(--text); }
    .tab-btn.active {
      background: var(--accent-soft);
      color: var(--accent);
    }

    /* ── Search ── */
    .search-wrap { position: relative; margin-bottom: 1rem; }
    .search-wrap svg {
      position: absolute; left: 14px; top: 50%;
      transform: translateY(-50%);
      opacity: 0.35; pointer-events: none;
    }
    .search-box {
      width: 100%;
      background: var(--surface);
      border: 0.5px solid var(--border);
      border-radius: var(--radius);
      color: var(--text);
      font-family: 'DM Sans', sans-serif;
      font-size: 0.9rem;
      padding: 10px 14px 10px 42px;
      outline: none;
      transition: border-color 0.2s;
    }
    .search-box:focus { border-color: var(--accent); }
    .search-box::placeholder { color: var(--text-faint); }

    /* ── Selection bar ── */
    .selection-bar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 1rem;
      flex-wrap: wrap;
      gap: 8px;
    }
    .selection-info {
      font-size: 0.85rem;
      color: var(--text-muted);
    }
    .selection-info strong { color: var(--accent); }
    .sel-actions { display: flex; gap: 6px; }

    /* ── Verb grid ── */
    .verb-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(140px, 1fr));
      gap: 7px;
      max-height: 340px;
      overflow-y: auto;
      padding: 2px 2px 6px;
      margin-bottom: 1.5rem;
      scrollbar-width: thin;
      scrollbar-color: var(--surface2) transparent;
    }
    .verb-grid::-webkit-scrollbar { width: 5px; }
    .verb-grid::-webkit-scrollbar-thumb { background: var(--surface2); border-radius: 99px; }

    .verb-chip {
      background: var(--surface);
      border: 0.5px solid var(--border);
      border-radius: var(--radius-sm);
      padding: 9px 11px;
      cursor: pointer;
      transition: all 0.18s;
      user-select: none;
    }
    .verb-chip:hover { border-color: var(--border-hover); background: var(--surface2); }
    .verb-chip.selected {
      border-color: rgba(139,124,248,0.5);
      background: var(--accent-dim);
    }
    .verb-chip .de { font-size: 0.82rem; font-weight: 600; color: var(--text); }
    .verb-chip .ar { font-size: 0.75rem; color: var(--text-muted); margin-top: 3px; direction: rtl; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .verb-chip.selected .de { color: var(--accent); }

    /* ── Mode toggle ── */
    .mode-row {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 1.5rem;
      flex-wrap: wrap;
    }
    .mode-row label { font-size: 0.85rem; color: var(--text-muted); white-space: nowrap; }
    .mode-toggle {
      display: flex;
      gap: 6px;
      background: var(--surface);
      border: 0.5px solid var(--border);
      border-radius: var(--radius);
      padding: 4px;
      flex: 1;
      min-width: 240px;
    }
    .mode-btn {
      flex: 1;
      border: none;
      border-radius: var(--radius-sm);
      background: transparent;
      color: var(--text-muted);
      font-family: 'DM Sans', sans-serif;
      font-size: 0.82rem;
      padding: 7px 10px;
      cursor: pointer;
      transition: all 0.18s;
      font-weight: 500;
    }
    .mode-btn.active { background: var(--accent-soft); color: var(--accent); }

    /* ── Buttons ── */
    .btn-primary {
      background: var(--accent);
      border: none;
      border-radius: var(--radius);
      color: #0f0e17;
      font-family: 'DM Sans', sans-serif;
      font-size: 0.95rem;
      font-weight: 600;
      padding: 12px 28px;
      cursor: pointer;
      transition: opacity 0.15s, transform 0.1s;
    }
    .btn-primary:hover { opacity: 0.88; }
    .btn-primary:active { transform: scale(0.97); }
    .btn-primary:disabled { opacity: 0.3; cursor: default; transform: none; }

    .btn-outline {
      background: transparent;
      border: 0.5px solid var(--border-hover);
      border-radius: var(--radius-sm);
      color: var(--text-muted);
      font-family: 'DM Sans', sans-serif;
      font-size: 0.82rem;
      padding: 7px 14px;
      cursor: pointer;
      transition: all 0.15s;
    }
    .btn-outline:hover { background: var(--surface2); color: var(--text); border-color: var(--border-hover); }

    /* ── Study screen ── */
    .study-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 1rem;
    }
    .card-counter { font-size: 0.85rem; color: var(--text-muted); }

    .progress-wrap {
      background: var(--surface2);
      border-radius: 99px;
      height: 4px;
      margin-bottom: 2rem;
      overflow: hidden;
    }
    .progress-fill {
      background: var(--accent);
      height: 100%;
      border-radius: 99px;
      transition: width 0.4s ease;
    }

    .flashcard {
      background: var(--surface);
      border: 0.5px solid var(--border);
      border-radius: var(--radius-lg);
      min-height: 240px;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      padding: 2.5rem 2rem;
      margin-bottom: 1.25rem;
      transition: border-color 0.2s, background 0.2s;
      text-align: center;
      position: relative;
      user-select: none;
    }
    .flashcard:hover { border-color: var(--border-hover); }
    .flashcard.revealed {
      border-color: rgba(139,124,248,0.35);
      background: var(--surface2);
    }
    .card-label {
      font-size: 0.72rem;
      font-weight: 600;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--text-faint);
      margin-bottom: 1rem;
    }
    .card-word {
      font-family: 'DM Serif Display', serif;
      font-size: clamp(2rem, 6vw, 3rem);
      font-weight: 400;
      color: var(--text);
      line-height: 1.1;
    }
    .card-translation {
      font-size: 1.5rem;
      color: var(--accent);
      margin-top: 1rem;
      direction: rtl;
      line-height: 1.4;
    }
    .flip-hint {
      position: absolute;
      bottom: 14px; right: 18px;
      font-size: 0.72rem;
      color: var(--text-faint);
    }

    .answer-btns {
      display: flex;
      gap: 10px;
      margin-bottom: 1.5rem;
    }
    .btn-correct {
      flex: 1;
      background: var(--green-bg);
      border: 0.5px solid var(--green-border);
      border-radius: var(--radius);
      color: var(--green);
      font-family: 'DM Sans', sans-serif;
      font-size: 0.95rem;
      font-weight: 600;
      padding: 12px;
      cursor: pointer;
      transition: opacity 0.15s;
    }
    .btn-correct:hover { opacity: 0.8; }
    .btn-wrong {
      flex: 1;
      background: var(--red-bg);
      border: 0.5px solid var(--red-border);
      border-radius: var(--radius);
      color: var(--red);
      font-family: 'DM Sans', sans-serif;
      font-size: 0.95rem;
      font-weight: 600;
      padding: 12px;
      cursor: pointer;
      transition: opacity 0.15s;
    }
    .btn-wrong:hover { opacity: 0.8; }

    /* ── Results ── */
    .results-title {
      font-family: 'DM Serif Display', serif;
      font-size: 2rem;
      font-weight: 400;
      margin-bottom: 0.4rem;
    }
    .results-sub { font-size: 0.9rem; color: var(--text-muted); margin-bottom: 1.75rem; }

    .stats-grid {
      display: grid;
      grid-template-columns: 1fr 1fr 1fr;
      gap: 10px;
      margin-bottom: 1.75rem;
    }
    .stat-card {
      background: var(--surface);
      border: 0.5px solid var(--border);
      border-radius: var(--radius);
      padding: 1.25rem 1rem;
      text-align: center;
    }
    .stat-num { font-size: 2rem; font-weight: 600; color: var(--text); }
    .stat-label { font-size: 0.78rem; color: var(--text-muted); margin-top: 4px; }
    .stat-card.good .stat-num { color: var(--green); }
    .stat-card.bad .stat-num { color: var(--red); }

    .missed-title { font-size: 0.85rem; color: var(--text-muted); margin-bottom: 0.75rem; }
    .result-btns { display: flex; gap: 10px; flex-wrap: wrap; margin-top: 1.5rem; }

    /* ── Divider ── */
    .divider {
      border: none;
      border-top: 0.5px solid var(--border);
      margin: 1.5rem 0;
    }

    /* ── Responsive ── */
    @media (max-width: 480px) {
      .stats-grid { grid-template-columns: 1fr 1fr; }
      .stat-card:first-child { grid-column: 1 / -1; }
    }
  </style>
</head>
<body>

<header>
  <div class="logo">🇩🇪 DaF Kompakt</div>
  <h1>Verb <em>Trainer</em></h1>
  <p>Memorize German verbs with flashcards — A1 &amp; A2 levels</p>
</header>

<main>

  <!-- ── SELECTION SCREEN ── -->
  <div id="screen-select" class="screen active">

    <div class="level-tabs">
      <button class="tab-btn active" onclick="setLevel('A1')">A1</button>
      <button class="tab-btn" onclick="setLevel('A2')">A2</button>
      <button class="tab-btn" onclick="setLevel('all')">All</button>
    </div>

    <div class="search-wrap">
      <svg width="16" height="16" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
        <circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/>
      </svg>
      <input class="search-box" type="text" id="search-input" placeholder="Search verbs in German or Arabic…" oninput="filterVerbs(this.value)">
    </div>

    <div class="selection-bar">
      <span class="selection-info" id="sel-info"><strong>0</strong> selected</span>
      <div class="sel-actions">
        <button class="btn-outline" onclick="randomPick(10)">Random 10</button>
        <button class="btn-outline" onclick="randomPick(20)">Random 20</button>
        <button class="btn-outline" onclick="selectAll()">All</button>
        <button class="btn-outline" onclick="clearSel()">Clear</button>
      </div>
    </div>

    <div class="verb-grid" id="verb-grid"></div>

    <div class="mode-row">
      <label>Direction:</label>
      <div class="mode-toggle">
        <button class="mode-btn active" id="mode-de" onclick="setMode('de')">German → Arabic</button>
        <button class="mode-btn" id="mode-ar" onclick="setMode('ar')">Arabic → German</button>
      </div>
    </div>

    <button class="btn-primary" id="start-btn" onclick="startSession()" disabled>
      Start session →
    </button>
  </div>

  <!-- ── STUDY SCREEN ── -->
  <div id="screen-study" class="screen">
    <div class="study-header">
      <span class="card-counter" id="card-counter">Card 1 / 10</span>
      <button class="btn-outline" onclick="goBack()">← Back</button>
    </div>
    <div class="progress-wrap">
      <div class="progress-fill" id="progress-fill" style="width:0%"></div>
    </div>

    <div class="flashcard" id="flashcard" onclick="revealCard()">
      <div class="card-label" id="card-label">German</div>
      <div class="card-word" id="card-word"></div>
      <div class="card-translation" id="card-translation" style="display:none"></div>
      <div class="flip-hint" id="flip-hint">tap to reveal</div>
    </div>

    <div class="answer-btns" id="answer-btns" style="display:none">
      <button class="btn-wrong" onclick="markAnswer(false)">✗ Didn't know</button>
      <button class="btn-correct" onclick="markAnswer(true)">✓ Knew it</button>
    </div>
  </div>

  <!-- ── RESULTS SCREEN ── -->
  <div id="screen-results" class="screen">
    <div class="results-title" id="result-emoji-title">Session complete!</div>
    <p class="results-sub" id="result-sub"></p>

    <div class="stats-grid">
      <div class="stat-card">
        <div class="stat-num" id="r-total">0</div>
        <div class="stat-label">Total cards</div>
      </div>
      <div class="stat-card good">
        <div class="stat-num" id="r-correct">0</div>
        <div class="stat-label">Knew it</div>
      </div>
      <div class="stat-card bad">
        <div class="stat-num" id="r-wrong">0</div>
        <div class="stat-label">Missed</div>
      </div>
    </div>

    <div id="missed-section" style="display:none">
      <hr class="divider">
      <p class="missed-title">Verbs to review:</p>
      <div class="verb-grid" id="missed-grid" style="max-height:200px;"></div>
    </div>

    <div class="result-btns">
      <button class="btn-primary" onclick="retryMissed()" id="retry-btn">Retry missed</button>
      <button class="btn-outline" onclick="newSession()">New session</button>
    </div>
  </div>

</main>

  let currentLevel = 'A1';
  let selected = new Set();
  let allVerbs = [...A1];
  let mode = 'de';
  let filtered = [];
  let sessionCards = [];
  let currentIdx = 0;
  let revealed = false;
  let correct = 0;
  let wrong = 0;
  let missedVerbs = [];

  function setLevel(l) {
    currentLevel = l;
    document.querySelectorAll('.tab-btn').forEach((b, i) => {
      b.classList.toggle('active', ['A1','A2','all'][i] === l);
    });
    allVerbs = l === 'A1' ? [...A1] : l === 'A2' ? [...A2] : [...A1, ...A2];
    clearSel();
    document.getElementById('search-input').value = '';
    filterVerbs('');
  }

  function setMode(m) {
    mode = m;
    document.getElementById('mode-de').classList.toggle('active', m === 'de');
    document.getElementById('mode-ar').classList.toggle('active', m === 'ar');
  }

  function filterVerbs(q) {
    q = q.toLowerCase();
    filtered = allVerbs.filter(v => v[0].toLowerCase().includes(q) || v[1].includes(q));
    renderGrid(filtered);
  }

  function renderGrid(list) {
    const grid = document.getElementById('verb-grid');
    grid.innerHTML = '';
    list.forEach(v => {
      const key = v[0];
      const div = document.createElement('div');
      div.className = 'verb-chip' + (selected.has(key) ? ' selected' : '');
      div.innerHTML = `<div class="de">${v[0]}</div><div class="ar">${v[1]}</div>`;
      div.onclick = () => {
        if (selected.has(key)) { selected.delete(key); div.classList.remove('selected'); }
        else { selected.add(key); div.classList.add('selected'); }
        updateSelInfo();
      };
      grid.appendChild(div);
    });
    updateSelInfo();
  }

  function updateSelInfo() {
    document.getElementById('sel-info').innerHTML = `<strong>${selected.size}</strong> selected`;
    document.getElementById('start-btn').disabled = selected.size < 2;
  }

  function randomPick(n) {
    clearSel();
    const pool = [...allVerbs].sort(() => Math.random() - 0.5);
    pool.slice(0, n).forEach(v => selected.add(v[0]));
    renderGrid(filtered.length > 0 ? filtered : allVerbs);
  }

  function selectAll() {
    allVerbs.forEach(v => selected.add(v[0]));
    renderGrid(filtered.length > 0 ? filtered : allVerbs);
  }

  function clearSel() {
    selected.clear();
    renderGrid(filtered.length > 0 ? filtered : allVerbs);
  }

  function startSession() {
    const lookup = Object.fromEntries([...A1, ...A2].map(v => [v[0], v[1]]));
    sessionCards = [...selected].map(k => [k, lookup[k]]).sort(() => Math.random() - 0.5);
    currentIdx = 0; correct = 0; wrong = 0; missedVerbs = [];
    showScreen('screen-study');
    showCard();
  }

  function showCard() {
    const card = sessionCards[currentIdx];
    revealed = false;
    const flashcard = document.getElementById('flashcard');
    flashcard.classList.remove('revealed');
    document.getElementById('card-translation').style.display = 'none';
    document.getElementById('answer-btns').style.display = 'none';
    document.getElementById('flip-hint').style.display = '';
    const front = mode === 'de' ? card[0] : card[1];
    document.getElementById('card-label').textContent = mode === 'de' ? 'German' : 'Arabic';
    document.getElementById('card-word').textContent = front;
    const total = sessionCards.length;
    document.getElementById('card-counter').textContent = `Card ${currentIdx + 1} / ${total}`;
    document.getElementById('progress-fill').style.width = (currentIdx / total * 100) + '%';
  }

  function revealCard() {
    if (revealed) return;
    revealed = true;
    const card = sessionCards[currentIdx];
    const back = mode === 'de' ? card[1] : card[0];
    document.getElementById('flashcard').classList.add('revealed');
    const tr = document.getElementById('card-translation');
    tr.textContent = back;
    tr.style.display = '';
    document.getElementById('answer-btns').style.display = 'flex';
    document.getElementById('flip-hint').style.display = 'none';
  }

  function markAnswer(knew) {
    if (knew) correct++;
    else { wrong++; missedVerbs.push(sessionCards[currentIdx]); }
    currentIdx++;
    if (currentIdx >= sessionCards.length) showResults();
    else showCard();
  }

  function showResults() {
    showScreen('screen-results');
    const total = sessionCards.length;
    const pct = Math.round(correct / total * 100);
    document.getElementById('r-total').textContent = total;
    document.getElementById('r-correct').textContent = correct;
    document.getElementById('r-wrong').textContent = wrong;
    document.getElementById('result-sub').textContent =
      `You scored ${pct}% — ${correct} out of ${total} verbs correct.`;
    const missedSec = document.getElementById('missed-section');
    const retryBtn = document.getElementById('retry-btn');
    if (missedVerbs.length > 0) {
      missedSec.style.display = '';
      retryBtn.style.display = '';
      const grid = document.getElementById('missed-grid');
      grid.innerHTML = '';
      missedVerbs.forEach(v => {
        const div = document.createElement('div');
        div.className = 'verb-chip';
        div.innerHTML = `<div class="de">${v[0]}</div><div class="ar">${v[1]}</div>`;
        grid.appendChild(div);
      });
    } else {
      missedSec.style.display = 'none';
      retryBtn.style.display = 'none';
    }
  }

  function retryMissed() {
    sessionCards = [...missedVerbs].sort(() => Math.random() - 0.5);
    currentIdx = 0; correct = 0; wrong = 0; missedVerbs = [];
    showScreen('screen-study');
    showCard();
  }

  function newSession() { showScreen('screen-select'); }
  function goBack() { showScreen('screen-select'); }

  function showScreen(id) {
    document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
    document.getElementById(id).classList.add('active');
    window.scrollTo(0, 0);
  }

  // init
  filtered = [...A1];
  renderGrid(filtered);
</script>
